<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - L&P Fashion</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

<div class="registro-page">

    <div class="registro-info">

        <h1>L&P Fashion 💕</h1>

        <p>
            Únete a nuestra tienda y descubre moda única, femenina y moderna.
        </p>

        <div class="registro-iconos">
            <p>✨ Tendencias actualizadas</p>
            <p>🚚 Envíos rápidos</p>
            <p>💖 Moda para tu estilo</p>
            <p>🐱 Diseños únicos y modernos</p>
        </div>

    </div>

    <div class="registro-box">

        <h2 class="titulo-registro">Crear Cuenta</h2>

        <form id="formRegistro">

            <label>Nombre completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre completo" required>

            <label>Correo electrónico</label>
            <input type="email" id="correo" placeholder="ejemplo@gmail.com" required>

            <label>Contraseña</label>
            <input type="password" id="password" placeholder="********" required>

            <label>Confirmar contraseña</label>
            <input type="password" id="confirmarPassword" placeholder="********" required>

            <button type="submit">
                Registrarme
            </button>

        </form>

        <p id="mensaje"></p>

        <p class="login-link-top">
            ¿Ya tienes cuenta?
            <a href="#">Inicia sesión</a>
        </p>

    </div>

</div>

<script src="registro.js"></script>

</body>
</html>
